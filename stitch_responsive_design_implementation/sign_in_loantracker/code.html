<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - LoanTracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

                        "on-primary": "#ffffff",
                        "on-primary-container": "#83829b",
                        "inverse-on-surface": "#f4f0f2",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#002019",
                        "background": "#fcf8fa",
                        "on-secondary-container": "#00725e",
                        "inverse-surface": "#313032",
                        "on-primary-fixed": "#1a1a2e",
                        "tertiary-fixed-dim": "#d5c59d",

                        "surface-tint": "#5d5c74",
                        "text": "#2c3e50",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "xl": "32px",
                        "sidebar-width": "240px",

                    "fontFamily": {

                    "fontSize": {

                        "body-sm": ["13px", { "lineHeight": "1.4", "fontWeight": "400" }],

<body class="bg-surface min-h-screen flex items-center justify-center p-md sm:p-lg antialiased">
<!-- Card Container -->
<main class="w-full max-w-[420px] bg-white rounded-xl shadow-sm border border-border p-xl sm:p-xxl">
<!-- Header -->
<div class="text-center mb-xl">
<div class="flex justify-center items-center gap-xs mb-md">
<div class="w-10 h-10 rounded-lg bg-teal/10 flex items-center justify-center text-teal">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
</div>
<h1 class="font-headline-xl text-headline-xl text-navy mb-xs tracking-tight">Welcome back</h1>
<p class="font-body-base text-body-base text-muted">Enter your credentials to access your ledger.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div class="space-y-xxs">
<label class="block font-label-sm text-label-sm text-text" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-muted">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full h-[44px] pl-10 pr-sm bg-white border border-border rounded-lg font-body-base text-body-base text-on-surface placeholder-muted focus:outline-none focus:border-teal focus:ring-2 focus:ring-teal/20 transition-all" id="email" name="email" placeholder="admin@loantracker.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xxs">
<div class="flex items-center justify-between">
<label class="block font-label-sm text-label-sm text-text" for="password">Password</label>
<a class="font-label-sm text-label-sm text-teal hover:text-secondary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-muted">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full h-[44px] pl-10 pr-xl bg-white border border-border rounded-lg font-body-base text-body-base text-on-surface placeholder-muted focus:outline-none focus:border-teal focus:ring-2 focus:ring-teal/20 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-sm flex items-center text-muted hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[44px] bg-teal text-white font-label-md text-label-md rounded-lg flex items-center justify-center hover:bg-secondary active:scale-[0.98] transition-all shadow-sm mt-xs" type="submit">
                Sign In
            </button>
</form>
<!-- Footer Links -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-muted">
                Don't have an account? 
                <a class="font-label-md text-label-md text-teal hover:text-secondary hover:underline transition-colors ml-xxs" href="#">Create an account</a>
</p>
</div>
</main>
</body></html>
